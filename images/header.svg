<svg xmlns="http://www.w3.org/2000/svg" width="920" height="280" viewBox="0 0 920 280" role="img" aria-label="YOLO26 Weapon Threat Detection">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="920" height="280" rx="16" fill="url(#bg)"/>
  <rect width="920" height="280" rx="16" fill="url(#grid)" opacity="0.5"/>
  <ellipse cx="760" cy="60" rx="120" ry="80" fill="url(#glow)" filter="url(#blur)"/>
  <ellipse cx="160" cy="220" rx="100" ry="70" fill="url(#glow)" filter="url(#blur)"/>

  <rect x="32" y="32" width="856" height="216" rx="12" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>

  <!-- Detection frame corners -->
  <path d="M 80 90 L 80 70 L 100 70" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 220 90 L 220 70 L 200 70" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 80 190 L 80 210 L 100 210" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 220 190 L 220 210 L 200 210" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bounding box -->
  <rect x="110" y="100" width="90" height="70" rx="2" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2" opacity="0.9"/>
  <rect x="125" y="115" width="55" height="35" rx="2" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="128" y="112" font-family="ui-monospace, monospace" font-size="9" fill="#ef4444" font-weight="600">gun 0.87</text>

  <!-- Neural network nodes -->
  <circle cx="310" cy="120" r="8" fill="#00d4ff" fill-opacity="0.2" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="350" cy="100" r="8" fill="#00d4ff" fill-opacity="0.2" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="350" cy="140" r="8" fill="#00d4ff" fill-opacity="0.2" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="390" cy="120" r="8" fill="#00d4ff" fill-opacity="0.2" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="318" y1="120" x2="342" y2="100" stroke="#334155" stroke-width="1"/>
  <line x1="318" y1="120" x2="342" y2="140" stroke="#334155" stroke-width="1"/>
  <line x1="358" y1="100" x2="382" y2="120" stroke="#334155" stroke-width="1"/>
  <line x1="358" y1="140" x2="382" y2="120" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="460" y="108" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">YOLO26 Weapon Threat Detection</text>
  <text x="460" y="142" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" fill="#94a3b8">FastAPI · Ultralytics YOLO26s · Roboflow · Hugging Face Spaces</text>

  <rect x="260" y="162" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.85"/>

  <!-- Class pills -->
  <rect x="300" y="180" width="72" height="26" rx="13" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="336" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fca5a5" font-weight="600">gun</text>

  <rect x="384" y="180" width="72" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="1"/>
  <text x="420" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fdba74" font-weight="600">knife</text>

  <rect x="468" y="180" width="152" height="26" rx="13" fill="#00d4ff" fill-opacity="0.12" stroke="#00d4ff" stroke-width="1"/>
  <text x="544" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7dd3fc" font-weight="600">person_with_mask</text>

  <!-- Metrics strip -->
  <text x="460" y="238" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#64748b">
    mAP@50 89.4%  ·  Precision 90.4%  ·  Recall 81.8%  ·  3 classes  ·  640px
  </text>

  <!-- API badge -->
  <rect x="760" y="88" width="120" height="88" rx="10" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="820" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#00d4ff" font-weight="700">POST</text>
  <text x="820" y="138" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0" font-weight="600">/predict</text>
  <text x="820" y="158" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#64748b">JSON + bbox</text>
</svg>
