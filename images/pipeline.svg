<svg xmlns="http://www.w3.org/2000/svg" width="860" height="120" viewBox="0 0 860 120" role="img" aria-label="ML Pipeline">
  <defs>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="860" height="120" rx="12" fill="#0f172a"/>

  <!-- Steps -->
  <g font-family="system-ui, sans-serif">
    <rect x="24" y="36" width="130" height="48" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="89" y="58" text-anchor="middle" font-size="11" fill="#94a3b8">1. Dataset</text>
    <text x="89" y="74" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">Roboflow</text>

    <line x1="160" y1="60" x2="188" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="192" y="36" width="130" height="48" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="257" y="58" text-anchor="middle" font-size="11" fill="#94a3b8">2. Limpeza</text>
    <text x="257" y="74" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">Labels BB</text>

    <line x1="328" y1="60" x2="356" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="360" y="36" width="130" height="48" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="425" y="58" text-anchor="middle" font-size="11" fill="#94a3b8">3. Treino</text>
    <text x="425" y="74" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">YOLO26s</text>

    <line x1="496" y1="60" x2="524" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="528" y="36" width="130" height="48" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="593" y="58" text-anchor="middle" font-size="11" fill="#94a3b8">4. AvaliańŃo</text>
    <text x="593" y="74" text-anchor="middle" font-size="12" fill="#e2e8f0" font-weight="600">mAP / F1</text>

    <line x1="664" y1="60" x2="692" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="696" y="36" width="140" height="48" rx="8" fill="#0c4a6e" stroke="url(#pipe)" stroke-width="1.5"/>
    <text x="766" y="58" text-anchor="middle" font-size="11" fill="#7dd3fc">5. Deploy</text>
    <text x="766" y="74" text-anchor="middle" font-size="12" fill="#f0f9ff" font-weight="600">FastAPI / HF</text>
  </g>
